<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<meta name="theme-color" content="#1b1f3b">
	<title>100 Blocks A Day</title>
	<style type="text/css">
		:root {
			--bg: #f4f5fb;
			--panel: #ffffff;
			--ink: #1b1f3b;
			--muted: #6b7088;
			--line: #e3e5f0;
			--shadow: 0 10px 30px rgba(27, 31, 59, 0.08);
			--radius: 16px;
		}

		* { box-sizing: border-box; }

		html { -webkit-text-size-adjust: 100%; }

		body {
			margin: 0;
			padding: 24px 16px calc(40px + env(safe-area-inset-bottom));
			background: var(--bg);
			color: var(--ink);
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			line-height: 1.4;
		}

		.wrap {
			max-width: 720px;
			margin: 0 auto;
		}

		header {
			text-align: center;
			margin-bottom: 20px;
		}

		header h1 {
			margin: 0;
			font-size: clamp(1.6rem, 5vw, 2.25rem);
			letter-spacing: -0.02em;
		}

		header p {
			margin: 6px 0 0;
			color: var(--muted);
			font-size: 0.95rem;
		}

		.clock {
			display: inline-flex;
			align-items: baseline;
			gap: 10px;
			margin-top: 14px;
			padding: 8px 18px;
			background: var(--ink);
			color: #fff;
			border-radius: 999px;
			box-shadow: var(--shadow);
		}

		.clock #time {
			font-variant-numeric: tabular-nums;
			font-weight: 600;
			font-size: 1.1rem;
		}

		.clock #date {
			font-size: 0.8rem;
			color: rgba(255, 255, 255, 0.7);
		}

		.panel {
			background: var(--panel);
			border-radius: var(--radius);
			box-shadow: var(--shadow);
			padding: 16px;
			margin-bottom: 18px;
		}

		.palette-head {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
			margin-bottom: 12px;
		}

		.palette-head h2 {
			margin: 0;
			font-size: 0.95rem;
			text-transform: uppercase;
			letter-spacing: 0.06em;
			color: var(--muted);
		}

		#clear-day {
			border: 1px solid var(--line);
			background: #fff;
			color: var(--muted);
			padding: 7px 14px;
			border-radius: 999px;
			font-size: 0.85rem;
			cursor: pointer;
			transition: background 0.15s, color 0.15s;
		}

		#clear-day:hover { background: #fff0f0; color: #d23b3b; border-color: #f2c2c2; }

		.palette {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
		}

		.swatch {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			padding: 8px 12px;
			border: 2px solid transparent;
			border-radius: 999px;
			background: var(--bg);
			cursor: pointer;
			font-size: 0.85rem;
			font-weight: 500;
			user-select: none;
			transition: transform 0.1s, border-color 0.15s, box-shadow 0.15s;
		}

		.swatch:hover { transform: translateY(-1px); }

		.swatch[aria-pressed="true"] {
			border-color: var(--ink);
			box-shadow: var(--shadow);
		}

		.swatch .dot {
			width: 16px;
			height: 16px;
			border-radius: 50%;
			border: 1px solid rgba(0, 0, 0, 0.12);
		}

		.swatch.erase .dot {
			background:
				linear-gradient(45deg, transparent 45%, #d23b3b 45%, #d23b3b 55%, transparent 55%),
				#fff;
		}

		#all-blocks {
			display: grid;
			grid-template-columns: repeat(10, 1fr);
			gap: clamp(3px, 1.2vw, 7px);
			touch-action: none; /* let us paint by dragging instead of scrolling */
		}

		.block {
			aspect-ratio: 1 / 1;
			border-radius: 6px;
			background: #fff;
			border: 1px solid var(--line);
			cursor: pointer;
			position: relative;
			transition: transform 0.08s, box-shadow 0.12s;
		}

		.block:hover { box-shadow: 0 0 0 2px rgba(27, 31, 59, 0.2); }

		.block.filled { border-color: transparent; }

		/* the block matching the current time */
		.block.now {
			box-shadow: 0 0 0 3px var(--ink);
			z-index: 1;
			animation: nowPulse 2s ease-in-out infinite;
		}

		@keyframes nowPulse {
			0%, 100% { box-shadow: 0 0 0 3px var(--ink); }
			50% { box-shadow: 0 0 0 3px rgba(27, 31, 59, 0.35); }
		}

		.settings {
			display: flex;
			align-items: center;
			justify-content: center;
			flex-wrap: wrap;
			gap: 8px;
			margin-top: 12px;
			font-size: 0.85rem;
			color: var(--muted);
		}

		.settings label { font-weight: 500; }

		.settings input[type="time"] {
			font: inherit;
			padding: 5px 8px;
			border: 1px solid var(--line);
			border-radius: 8px;
			background: #fff;
			color: var(--ink);
		}

		.settings #now-label { color: var(--ink); font-weight: 600; }

		.summary {
			display: flex;
			flex-wrap: wrap;
			gap: 10px;
		}

		.stat {
			display: flex;
			align-items: center;
			gap: 8px;
			font-size: 0.85rem;
			color: var(--muted);
		}

		.stat .dot {
			width: 12px;
			height: 12px;
			border-radius: 50%;
		}

		.stat.total {
			margin-left: auto;
			font-weight: 600;
			color: var(--ink);
		}

		footer {
			text-align: center;
			color: var(--muted);
			font-size: 0.8rem;
			margin-top: 8px;
		}

		footer a { color: var(--muted); }
	</style>
</head>

<body>
<div class="wrap">
	<header>
		<h1>100 Blocks a Day</h1>
		<p>Your waking day is about 100 ten-minute blocks. Pick a category, then click or drag to plan it.</p>
		<div class="clock">
			<span id="time">--:--:--</span>
			<span id="date"></span>
		</div>
		<div class="settings">
			<label for="day-start">My day starts at</label>
			<input type="time" id="day-start" value="06:00">
			<span id="now-label"></span>
		</div>
	</header>

	<section class="panel">
		<div class="palette-head">
			<h2>Categories</h2>
			<button id="clear-day" type="button">Clear day</button>
		</div>
		<div class="palette" id="palette"></div>
	</section>

	<section class="panel">
		<div id="all-blocks"></div>
	</section>

	<section class="panel">
		<div class="summary" id="summary"></div>
	</section>

	<footer>
		Inspired by <a href="https://waitbutwhy.com/2016/10/100-blocks-day.html" target="_blank" rel="noopener">Wait But Why &mdash; 100 Blocks a Day</a>.
		Your plan is saved on this device.
	</footer>
</div>

<script type="text/javascript">
	"use strict";

	var TOTAL_BLOCKS = 100;
	var MINUTES_PER_BLOCK = 10;
	// 100 blocks x 10 min = 1000 min = the ~16h40m waking day.
	var DAY_START_KEY = "day-start";
	var dayStartMinutes = 6 * 60; // default: day starts at 06:00

	// Category palette. The first entry (Erase) clears a block.
	var CATEGORIES = [
		{ id: "erase",   label: "Erase",   color: null },
		{ id: "sleep",   label: "Sleep",   color: "#5b6bd6" },
		{ id: "work",    label: "Work",    color: "#3aa0ff" },
		{ id: "health",  label: "Health",  color: "#2bb673" },
		{ id: "eat",     label: "Eat",     color: "#f5a623" },
		{ id: "social",  label: "Social",  color: "#ec5f9b" },
		{ id: "leisure", label: "Leisure", color: "#9b59d6" },
		{ id: "chores",  label: "Chores",  color: "#8a93a8" }
	];

	function colorOf(id) {
		for (var i = 0; i < CATEGORIES.length; i++) {
			if (CATEGORIES[i].id === id) { return CATEGORIES[i].color; }
		}
		return null;
	}

	// ---- live clock -------------------------------------------------------
	function pad(n) { return n < 10 ? "0" + n : "" + n; }

	function tick() {
		var now = new Date();
		document.getElementById("time").textContent =
			pad(now.getHours()) + ":" + pad(now.getMinutes()) + ":" + pad(now.getSeconds());
		document.getElementById("date").textContent =
			now.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
		updateCurrentBlock(now);
		setTimeout(tick, 500);
	}

	// Which block (0-99) corresponds to "now", or -1 if outside the day window.
	function currentBlockIndex(now) {
		var minutesIntoDay = (now.getHours() * 60 + now.getMinutes()) - dayStartMinutes;
		if (minutesIntoDay < 0) {
			minutesIntoDay += 24 * 60; // day window wraps past midnight
		}
		var idx = Math.floor(minutesIntoDay / MINUTES_PER_BLOCK);
		return (idx >= 0 && idx < TOTAL_BLOCKS) ? idx : -1;
	}

	function updateCurrentBlock(now) {
		var idx = currentBlockIndex(now);
		var prev = document.querySelector(".block.now");
		var label = document.getElementById("now-label");

		if (idx < 0) {
			if (prev) { prev.classList.remove("now"); }
			label.textContent = "(outside your day)";
			return;
		}

		var target = document.querySelector('.block[data-idx="' + idx + '"]');
		if (prev && prev !== target) { prev.classList.remove("now"); }
		if (target) { target.classList.add("now"); }
		label.textContent = "· now on block " + (idx + 1);
	}

	// ---- persistence (one saved plan per calendar day) --------------------
	function storageKey() {
		var d = new Date();
		return "blocks-" + d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
	}

	// plan[i] = category id (or "erase"/undefined for empty)
	var plan = {};

	function loadPlan() {
		try {
			var raw = localStorage.getItem(storageKey());
			plan = raw ? JSON.parse(raw) : {};
		} catch (e) {
			plan = {};
		}
	}

	function savePlan() {
		try {
			localStorage.setItem(storageKey(), JSON.stringify(plan));
		} catch (e) { /* storage unavailable; keep working in-memory */ }
	}

	// ---- state ------------------------------------------------------------
	var activeCategory = "sleep"; // default paint color
	var isPainting = false;

	function applyToBlock(node) {
		var idx = node.getAttribute("data-idx");
		var color = colorOf(activeCategory);
		if (activeCategory === "erase" || color === null) {
			delete plan[idx];
			node.style.backgroundColor = "";
			node.classList.remove("filled");
		} else {
			plan[idx] = activeCategory;
			node.style.backgroundColor = color;
			node.classList.add("filled");
		}
	}

	function renderBlockFromPlan(node, idx) {
		var color = colorOf(plan[idx]);
		if (color) {
			node.style.backgroundColor = color;
			node.classList.add("filled");
		} else {
			node.style.backgroundColor = "";
			node.classList.remove("filled");
		}
	}

	// ---- summary ----------------------------------------------------------
	function updateSummary() {
		var counts = {};
		var used = 0;
		Object.keys(plan).forEach(function(idx) {
			counts[plan[idx]] = (counts[plan[idx]] || 0) + 1;
			used++;
		});

		var summary = document.getElementById("summary");
		summary.innerHTML = "";

		CATEGORIES.forEach(function(cat) {
			if (cat.id === "erase" || !counts[cat.id]) { return; }
			var n = counts[cat.id];
			var mins = n * MINUTES_PER_BLOCK;
			var label = n + " · " + Math.floor(mins / 60) + "h" + pad(mins % 60);
			var stat = document.createElement("div");
			stat.className = "stat";
			var dot = document.createElement("span");
			dot.className = "dot";
			dot.style.backgroundColor = cat.color;
			stat.appendChild(dot);
			var text = document.createElement("span");
			text.textContent = cat.label + ": " + label;
			stat.appendChild(text);
			summary.appendChild(stat);
		});

		var total = document.createElement("div");
		total.className = "stat total";
		var totalText = document.createElement("span");
		totalText.textContent = used + " / " + TOTAL_BLOCKS + " blocks planned";
		total.appendChild(totalText);
		summary.appendChild(total);
	}

	// ---- palette ----------------------------------------------------------
	function buildPalette() {
		var palette = document.getElementById("palette");
		CATEGORIES.forEach(function(cat) {
			var btn = document.createElement("button");
			btn.type = "button";
			btn.className = cat.id === "erase" ? "swatch erase" : "swatch";
			btn.setAttribute("data-cat", cat.id);
			btn.setAttribute("aria-pressed", cat.id === activeCategory ? "true" : "false");
			btn.addEventListener("click", function() { setActive(cat.id); });

			var dot = document.createElement("span");
			dot.className = "dot";
			if (cat.color) { dot.style.backgroundColor = cat.color; }
			btn.appendChild(dot);

			var text = document.createElement("span");
			text.textContent = cat.label;
			btn.appendChild(text);

			palette.appendChild(btn);
		});
	}

	function setActive(id) {
		activeCategory = id;
		var swatches = document.querySelectorAll(".swatch");
		for (var i = 0; i < swatches.length; i++) {
			swatches[i].setAttribute("aria-pressed",
				swatches[i].getAttribute("data-cat") === id ? "true" : "false");
		}
	}

	// ---- blocks + painting ------------------------------------------------
	function buildBlocks() {
		var allBlocks = document.getElementById("all-blocks");
		for (var i = 0; i < TOTAL_BLOCKS; i++) {
			var block = document.createElement("div");
			block.className = "block";
			block.setAttribute("data-idx", i);
			block.title = "Block " + (i + 1);
			// reflect any saved plan
			renderBlockFromPlan(block, String(i));
			allBlocks.appendChild(block);
		}
	}

	function blockUnderPoint(x, y) {
		var el = document.elementFromPoint(x, y);
		return el && el.classList && el.classList.contains("block") ? el : null;
	}

	function setupPainting() {
		var grid = document.getElementById("all-blocks");

		// Pointer events unify mouse + touch. We track movement ourselves via
		// elementFromPoint so a single drag paints across many blocks on touch.
		grid.addEventListener("pointerdown", function(e) {
			var node = blockUnderPoint(e.clientX, e.clientY);
			if (!node) { return; }
			isPainting = true;
			applyToBlock(node);
			e.preventDefault();
		});

		grid.addEventListener("pointermove", function(e) {
			if (!isPainting) { return; }
			var node = blockUnderPoint(e.clientX, e.clientY);
			if (node) { applyToBlock(node); }
			e.preventDefault();
		});

		function endPaint() {
			if (!isPainting) { return; }
			isPainting = false;
			savePlan();
			updateSummary();
		}

		document.addEventListener("pointerup", endPaint);
		document.addEventListener("pointercancel", endPaint);
	}

	// ---- init -------------------------------------------------------------
	document.getElementById("clear-day").addEventListener("click", function() {
		plan = {};
		savePlan();
		var blocks = document.querySelectorAll(".block");
		for (var i = 0; i < blocks.length; i++) {
			blocks[i].style.backgroundColor = "";
			blocks[i].classList.remove("filled");
		}
		updateSummary();
	});

	function setupDayStart() {
		var input = document.getElementById("day-start");
		var saved = null;
		try { saved = localStorage.getItem(DAY_START_KEY); } catch (e) { /* ignore */ }
		if (saved) { input.value = saved; }

		function apply() {
			var parts = input.value.split(":");
			if (parts.length === 2) {
				dayStartMinutes = (parseInt(parts[0], 10) || 0) * 60 + (parseInt(parts[1], 10) || 0);
			}
			try { localStorage.setItem(DAY_START_KEY, input.value); } catch (e) { /* ignore */ }
			updateCurrentBlock(new Date());
		}

		input.addEventListener("change", apply);
		apply(); // sync dayStartMinutes with whatever value the input holds
	}

	loadPlan();
	buildPalette();
	buildBlocks();
	setupPainting();
	setupDayStart();
	updateSummary();
	setActive(activeCategory);
	tick();
</script>
</body>
</html>
